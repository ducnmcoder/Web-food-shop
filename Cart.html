<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart - FoodShop</title>

    <!-- Bootstrap CSS -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <style>
        :root {
            --main-color: #28a745;
            --secondary-color: #ff9800;
            --light-bg: #f8fff8;
            --dark-text: #222;
        }

        body {
            font-family: Arial, sans-serif;
            color: var(--dark-text);
            background-color: #f8f9fa;
        }

        .navbar {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .navbar-brand {
            font-weight: bold;
            color: var(--main-color) !important;
            font-size: 1.6rem;
        }

        .nav-link {
            font-weight: 500;
        }

        .nav-link:hover {
            color: var(--main-color) !important;
        }

        .btn-main {
            background-color: var(--main-color);
            color: white;
            border: none;
        }

        .btn-main:hover {
            background-color: #218838;
            color: white;
        }

        .btn-orange {
            background-color: var(--secondary-color);
            color: white;
            border: none;
        }

        .btn-orange:hover {
            background-color: #e68900;
            color: white;
        }

        .cart-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }
        
        .cart-item {
            vertical-align: middle;
        }
        
        footer {
            background-color: #1f1f1f;
            color: white;
            padding: 35px 0;
            margin-top: auto;
        }

        footer a {
            color: #ddd;
            text-decoration: none;
        }

        footer a:hover {
            color: var(--secondary-color);
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-white sticky-top">
    <div class="container">
        <a class="navbar-brand" href="Homepage.html">FoodShop</a>

        <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNavbar"
        >
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="Homepage.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="Cart.html" style="color: var(--secondary-color);"><i class="bi bi-cart3"></i> Cart <span id="cartCount" class="badge bg-danger rounded-pill">0</span></a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Cart Section -->
<section class="py-5 flex-grow-1">
    <div class="container">
        <h2 class="mb-4 text-center" style="color: var(--main-color); font-weight: bold;">Your Cart</h2>
        <div class="row" id="cartContent">
            <!-- Render via JS -->
        </div>
    </div>
</section>

<!-- Footer -->
<footer>
    <div class="container">
        <div class="row g-4">
            <div class="col-md-6">
                <h4>FoodShop</h4>
                <p>
                    Online food store providing fresh, safe, and convenient products for every family.
                </p>
            </div>
            <div class="col-md-6 text-md-end">
                <p class="mb-0">
                    © 2026 FoodShop. All rights reserved.
                </p>
            </div>
        </div>
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JavaScript -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const cartContent = document.getElementById('cartContent');
        
        function renderCart() {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            updateCartCount();

            if (cart.length === 0) {
                cartContent.innerHTML = `
                    <div class="col-12 text-center py-5 bg-white rounded-3 shadow-sm border">
                        <i class="bi bi-cart-x text-muted" style="font-size: 4rem;"></i>
                        <h4 class="mt-3">Cart is empty</h4>
                        <p class="text-muted">You haven't added any products to your cart yet.</p>
                        <a href="Homepage.html" class="btn btn-main mt-2">Continue Shopping</a>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="col-lg-8">
                    <div class="card shadow-sm border-0 mb-4">
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table mb-0 table-hover">
                                    <thead class="table-light">
                                        <tr>
                                            <th scope="col" class="ps-4 py-3">Product</th>
                                            <th scope="col" class="py-3">Price</th>
                                            <th scope="col" class="py-3">Quantity</th>
                                            <th scope="col" class="py-3">Total</th>
                                            <th scope="col" class="pe-4 py-3"></th>
                                        </tr>
                                    </thead>
                                    <tbody>
            `;

            let total = 0;

            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                html += `
                    <tr class="cart-item">
                        <td class="ps-4 py-3">
                            <div class="d-flex align-items-center">
                                <img src="${item.image}" alt="${item.name}" class="cart-img me-3 border">
                                <span class="fw-bold">${item.name}</span>
                            </div>
                        </td>
                        <td class="py-3 align-middle">${item.price.toLocaleString('en-US')} VND</td>
                        <td class="py-3 align-middle">
                            <div class="d-flex align-items-center" style="width: 120px;">
                                <button class="btn btn-sm btn-outline-secondary btn-decrease" data-index="${index}">-</button>
                                <input type="text" class="form-control form-control-sm text-center mx-1 fw-bold" value="${item.quantity}" readonly>
                                <button class="btn btn-sm btn-outline-secondary btn-increase" data-index="${index}">+</button>
                            </div>
                        </td>
                        <td class="py-3 align-middle fw-bold" style="color: var(--secondary-color);">${itemTotal.toLocaleString('en-US')} VND</td>
                        <td class="pe-4 py-3 align-middle text-end">
                            <button class="btn btn-sm btn-outline-danger btn-remove" data-index="${index}"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>
                `;
            });

            html += `
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between mb-4">
                        <a href="Homepage.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Continue Shopping</a>
                        <button class="btn btn-outline-danger" id="btnClearCart">Clear Cart</button>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="card shadow-sm border-0">
                        <div class="card-body p-4">
                            <h5 class="fw-bold mb-4 border-bottom pb-3">Order Summary</h5>
                            <div class="d-flex justify-content-between mb-3">
                                <span class="text-muted">Subtotal:</span>
                                <span class="fw-bold">${total.toLocaleString('en-US')} VND</span>
                            </div>
                            <div class="d-flex justify-content-between mb-3">
                                <span class="text-muted">Shipping:</span>
                                <span class="fw-bold text-success">Free</span>
                            </div>
                            <hr class="my-4">
                            <div class="d-flex justify-content-between mb-4">
                                <span class="fw-bold fs-5">Total:</span>
                                <span class="fw-bold fs-4" style="color: var(--secondary-color);">${total.toLocaleString('en-US')} VND</span>
                            </div>
                            <button class="btn btn-main w-100 btn-lg" onclick="alert('Checkout functionality is under development!')">Proceed to Checkout</button>
                        </div>
                    </div>
                </div>
            `;

            cartContent.innerHTML = html;

            // Add event listeners
            document.querySelectorAll('.btn-increase').forEach(btn => {
                btn.addEventListener('click', function() {
                    const idx = this.getAttribute('data-index');
                    cart[idx].quantity += 1;
                    localStorage.setItem('cart', JSON.stringify(cart));
                    renderCart();
                });
            });

            document.querySelectorAll('.btn-decrease').forEach(btn => {
                btn.addEventListener('click', function() {
                    const idx = this.getAttribute('data-index');
                    if(cart[idx].quantity > 1) {
                        cart[idx].quantity -= 1;
                        localStorage.setItem('cart', JSON.stringify(cart));
                        renderCart();
                    }
                });
            });

            document.querySelectorAll('.btn-remove').forEach(btn => {
                btn.addEventListener('click', function() {
                    const idx = this.getAttribute('data-index');
                    cart.splice(idx, 1);
                    localStorage.setItem('cart', JSON.stringify(cart));
                    renderCart();
                });
            });
            
            const btnClearCart = document.getElementById('btnClearCart');
            if(btnClearCart) {
                btnClearCart.addEventListener('click', function() {
                    if(confirm("Are you sure you want to clear the entire cart?")) {
                        localStorage.removeItem('cart');
                        renderCart();
                    }
                });
            }
        }

        function updateCartCount() {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            let count = cart.reduce((total, item) => total + item.quantity, 0);
            const cartCountEl = document.getElementById('cartCount');
            if(cartCountEl) {
                cartCountEl.textContent = count;
            }
        }

        renderCart();
    });
</script>
</body>
</html>
